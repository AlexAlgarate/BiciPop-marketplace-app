name: keepcoding-Frontend-Avanzado-NextJS_projecy

services:
  postgres:
    image: postgres:16
    container_name: keepcoding-postgres-project
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextjs_db
    ports:
      - '54321:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
